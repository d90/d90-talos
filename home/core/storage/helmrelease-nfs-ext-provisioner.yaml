apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-subdir-external-provisioner
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: ">=4.0.18"
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: flux-system
  values:
    storageClass:
      create: false
      name: nfs-client         # match your standalone SC
      provisionerName: k8s-sigs.io/nfs-subdir-external-provisioner      
    nfs:
      server: "10.10.10.210"
      path: "/containerData"
      mountOptions:
        - vers=4
        - tcp

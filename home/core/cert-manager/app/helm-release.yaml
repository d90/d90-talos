---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cert-manager
  namespace: *app
spec:
  chart:
    spec:
      chart: *app
      version: v1.19.3
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  interval: 24h0m0s
  values:
    installCRDs: false
    replicaCount: 3

apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: networking
  annotations:
    metallb.universe.tf/address: "10.10.100.80"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - name: web
      protocol: TCP
      port: 80
      targetPort: 8000
    - name: websecure
      protocol: TCP
      port: 443
      targetPort: 8443
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432


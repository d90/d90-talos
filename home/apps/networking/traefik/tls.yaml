apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tls.traefik
  namespace: networking
spec:
  dnsNames:
    - traefik.d90.name
  secretName: tls.traefik
  privateKey:
    algorithm: ECDSA
    size: 256
  revisionHistoryLimit: 1
  issuerRef:
    name: le-prod-issuer
    kind: ClusterIssuer

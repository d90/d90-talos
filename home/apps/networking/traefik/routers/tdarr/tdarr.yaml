apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
    name: tdarr
    namespace: tdarr
    annotations:
        gethomepage.dev/href: https://tdarr.d90.name
        gethomepage.dev/enabled: "true"
        gethomepage.dev/description: tdarr
        gethomepage.dev/group: Media Stack
        gethomepage.dev/icon: tdarr.png
        gethomepage.dev/name: tdarr  
spec:
    entryPoints:
        - websecure
    routes:
        - match: Host(`tdarr.d90.name`)
          kind: Rule
          services:
            - name: tdarr
              kind: Service
              port: 8265
    tls:
        secretName: tls.tdarr

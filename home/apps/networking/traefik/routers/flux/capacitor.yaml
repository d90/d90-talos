apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: capacitor
  namespace: flux-system
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`capacitor.d90.name`)
      services:
        - kind: Service
          name: capacitor
          namespace: flux-system
          port: 9000
  tls:
    secretName: tls.capacitor

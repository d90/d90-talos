apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`grafana.d90.name`)
    kind: Rule
    services:
    - name: grafana
      kind: Service
      port: 80
  tls:
    secretName: tls.grafana
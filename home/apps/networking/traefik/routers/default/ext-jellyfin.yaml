apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: default
spec:
  ports:
    - port: 8096
      targetPort: 8096
  clusterIP: None
---
apiVersion: v1
kind: Endpoints
metadata:
  name: jellyfin
  namespace: default
subsets:
  - addresses:
      - ip: 10.10.10.45
    ports:
      - port: 8096
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: default
  annotations:
    gethomepage.dev/href: "https://jellyfin.d90.name"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Streaming
    gethomepage.dev/icon: sh-jellyfin
    gethomepage.dev/name: jellyfin
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyfin.d90.name`)
      kind: Rule
      services:
        - name: jellyfin
          port: 8096
  tls:
    secretName: tls.jellyfin

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tls.jellyfin
  namespace: default
spec:
  dnsNames:
    - jellyfin.d90.name
  secretName: tls.jellyfin
  privateKey:
    algorithm: ECDSA
    size: 256
  revisionHistoryLimit: 1
  issuerRef:
    name: le-prod-issuer
    kind: ClusterIssuer

apiVersion: apps/v1
kind: Deployment
metadata:
  name: qnap-cert-sync
  namespace: default
  annotations:
    # This tells Reloader to watch any ConfigMap or Secret mounted in this deployment
    reloader.stakater.com/auto: "true"
  labels:
    app: qnap-cert-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qnap-cert-sync
  template:
    metadata:
      labels:
        app: qnap-cert-sync
    spec:
      containers:
      - name: syncer
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "[$(date)] Container started. Preparing to sync..."

            # 1. Install SSH Client
            apk add --no-cache openssh-client

            # 2. Setup SSH Identity
            mkdir -p /root/.ssh
            cp /etc/ssh-key/id_ed25519 /root/.ssh/id_ed25519
            chmod 600 /root/.ssh/id_ed25519
            echo "StrictHostKeyChecking no" >> /etc/ssh/ssh_config

            # 3. Format Certificate (Key + Cert)
            # Ensure there is a newline between them
            cat /etc/certs/tls.key > /tmp/stunnel.pem
            echo "" >> /tmp/stunnel.pem
            cat /etc/certs/tls.crt >> /tmp/stunnel.pem

            # 4. Push to QNAP
            echo "Pushing certificate to 10.10.10.210..."
            scp /tmp/stunnel.pem admin@10.10.10.210:/tmp/stunnel.new

            # 5. Remote Apply
            # We use 'cp' to the persistent path only; the symlink handles /etc/
            ssh admin@10.10.10.210 << 'EOF'
              set -e
              PERSIST="/mnt/HDA_ROOT/.config/stunnel/stunnel.pem"
              
              echo "Moving new cert to persistent storage..."
              mv /tmp/stunnel.new $PERSIST
              chmod 600 $PERSIST

              echo "Restarting QNAP Services..."
              /etc/init.d/stunnel.sh restart
              /etc/init.d/Qthttpd.sh restart
              echo "Done."
            EOF
            
            echo "[$(date)] Sync complete. Sleeping until next Reloader trigger..."
            exec tail -f /dev/null
        volumeMounts:
        - name: cert-volume
          mountPath: "/etc/certs"
          readOnly: true
        - name: ssh-volume
          mountPath: "/etc/ssh-key"
          readOnly: true
      volumes:
      - name: cert-volume
        secret:
          secretName: tls.qnap # Reloader watches this
      - name: ssh-volume
        secret:
          secretName: qnap-ssh-key    
apiVersion: v1
kind: Service
metadata:
  name: qnap
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: https  # <--- ADD THIS
spec:
  ports:
    - name: https # It is good practice to name this 'https' as well
      port: 443
      targetPort: 443
  clusterIP: None
---
apiVersion: v1
kind: Endpoints
metadata:
  name: qnap
  namespace: default
subsets:
  - addresses:
      - ip: 10.10.10.210
    ports:
      - name: https
        port: 443
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: qnap
  namespace: default
  annotations:
    gethomepage.dev/href: "https://nas.d90.name"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Network
    gethomepage.dev/icon: sh-qnap
    gethomepage.dev/name: QNAP Nas
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`nas.d90.name`)
      kind: Rule
      services:
      - name: qnap
        port: 443
  tls:
    secretName: tls.qnap
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tls.qnap
  namespace: default
spec:
  dnsNames:
    - nas.d90.name
  secretName: tls.qnap
  privateKey:
    algorithm: ECDSA
    size: 256
  revisionHistoryLimit: 1
  issuerRef:
    name: le-prod-issuer
    kind: ClusterIssuer
---

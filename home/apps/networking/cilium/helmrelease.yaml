apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 10m
  install:
    timeout: 15m
  upgrade:
    timeout: 15m
  chart:
    spec:
      chart: cilium
      version: ">=1.16.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 1h

  values:
    # Talos requires cgroups to be pre-mounted
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup

    # Required capabilities for Talos immutable OS
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE

    # kube-proxy replacement — points at KubePrism (Talos local HA proxy)
    kubeProxyReplacement: true
    k8sServiceHost: localhost
    k8sServicePort: 7445

    # Use Kubernetes-assigned pod CIDRs (matches Talos/Flannel CIDR 10.244.0.0/16)
    ipam:
      mode: kubernetes

    # Network device for L2 announcements and direct routing
    devices: ens18

    # L2 announcements — replaces MetalLB
    l2announcements:
      enabled: true

    # Required for L2 announcement lease management
    externalIPs:
      enabled: true

    # Hubble observability (disabled for now, enable later)
    hubble:
      enabled: false
      relay:
        enabled: false
      ui:
        enabled: false

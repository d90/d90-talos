apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr
  namespace: tdarr
  labels:
    app: tdarr
  annotations:
    fluxcd.io/automated: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdarr
  template:
    metadata:
      labels:
        app: tdarr
    spec:
      containers:
      - name: tdarr
        image: ghcr.io/haveagitgat/tdarr:2.84.01@sha256:93dd407f8a28b035b3ebece794bd3f489a9b07a810ca02b804adf72387888355
        env:
          - name: NODE_ENV
            value: "production"
        volumeMounts:
          - name: nfs-data
            mountPath: /data
          - name: nfs-conf
            mountPath: /app/server
            subPath: tdarr/server
          - name: nfs-conf
            mountPath: /app/configs
            subPath: tdarr/configs
          - name: nfs-conf
            mountPath: /app/logs
            subPath: tdarr/logs
          - name: nfs-conf
            mountPath: /temp
            subPath: tdarr/transcode_cache
      volumes:
        - name: nfs-data
          persistentVolumeClaim:
            claimName: nfs-pvc-data-tdarr
        - name: nfs-conf
          persistentVolumeClaim:
            claimName: nfs-pvc-containerdata-tdarr

apiVersion: batch/v1
kind: CronJob
metadata:
  name: route53-dyndns-cron
  namespace: default
spec:
  schedule: "*/20 * * * *"
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 100
      template:
        spec:
          containers:
          - image: docker.io/bshaw/route53-dyndns:5@sha256:08f1d890ed48cd36bc1837dfb09456f5762c794b88b69543bfd248d1882d1319
            name: route53-dyndns
            imagePullPolicy: Always
            envFrom:
            - prefix: ''
              secretRef:
                name: route53-dyndns-secret
            args:
            - --record
            - home.nickdininno.com
            - --verbose
          restartPolicy: OnFailure
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nzbget
  namespace: default
spec:
  interval: 5m

  chart:
    spec:
      chart: nzbget
      version: "30.8.4" # Ensure this matches the available nzbget chart version in your repo
      sourceRef:
        kind: HelmRepository
        name: tc-truecharts
        namespace: flux-system
      interval: 1h

  values:

    # ───────────────────────────────────────────────
    # Disable metrics to avoid ServiceMonitor CRDs
    # ───────────────────────────────────────────────
    metrics:
      main:
        enabled: false
        serviceMonitor:
          enabled: false

    # ───────────────────────────────────────────────
    # Disable built-in ingress
    # ───────────────────────────────────────────────
    ingress:
      main:
        enabled: false

    # ───────────────────────────────────────────────
    # Service definition
    # ───────────────────────────────────────────────
    service:
      main:
        enabled: true
        primary: true
        ports:
          main:
            enabled: true
            primary: true
            protocol: http
            port: 6789      # Changed for nzbget
            targetPort: 6789 # Changed for nzbget

    # ───────────────────────────────────────────────
    # Persistence (media + config)
    # ───────────────────────────────────────────────
    persistence:
      media:
        enabled: true
        type: pvc
        existingClaim: nfs-pvc-data
        mountPath: /media

      config:
        enabled: true
        type: pvc
        storageClass: nfs-client
        size: 10Gi
        existingClaim: ""
        mountPath: /config

    # ───────────────────────────────────────────────
    # Workload + PRODUCTION-GRADE PROBES
    # ───────────────────────────────────────────────
    workload:
      main:
        type: Deployment
        enabled: true
        primary: true

        podSpec:
          securityContext:
            container:
              readOnlyRootFilesystem: false

          containers:
            main:
              enabled: true
              primary: true
              imageSelector: image

              # Correct container port
              ports:
                - name: main
                  containerPort: 6789 # Changed for nzbget

              # ───────────────────────────────────────
              # STABLE PROBES FOR NFS + LARGE LIBRARIES
              # ───────────────────────────────────────

              probes:
                # NZBGet returns 401 on all HTTP paths — use TCP to check port is open
                readiness:
                  enabled: true
                  type: tcp
                  port: main
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 12
                  successThreshold: 1

                liveness:
                  enabled: true
                  type: tcp
                  port: main
                  initialDelaySeconds: 30
                  periodSeconds: 20
                  timeoutSeconds: 2
                  failureThreshold: 10

                startup:
                  enabled: true
                  type: tcp
                  port: main
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 90
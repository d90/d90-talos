apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: default
spec:
  interval: 5m

  chart:
    spec:
      chart: seerr
      version: "16.0.0" # Ensure this matches the available seerr chart version in your repo
      sourceRef:
        kind: HelmRepository
        name: tc-truecharts
        namespace: flux-system
      interval: 1h

  values:

    # ───────────────────────────────────────────────
    # Disable built-in CNPG cluster (we manage our own in database.yaml)
    # ───────────────────────────────────────────────
    cnpg:
      main:
        enabled: false

    # ───────────────────────────────────────────────
    # Disable metrics to avoid ServiceMonitor CRDs
    # ───────────────────────────────────────────────
    metrics:
      main:
        enabled: false
        serviceMonitor:
          enabled: false

    # ───────────────────────────────────────────────
    # Disable built-in ingress
    # ───────────────────────────────────────────────
    ingress:
      main:
        enabled: false

    # ───────────────────────────────────────────────
    # Service definition
    # ───────────────────────────────────────────────
    service:
      main:
        enabled: true
        primary: true
        ports:
          main:
            enabled: true
            primary: true
            protocol: http
            port: 10241       # Changed for seerr
            targetPort: 10241 # Changed for seerr

    # ───────────────────────────────────────────────
    # Persistence (media + config)
    # ───────────────────────────────────────────────
    persistence:

      config:
        enabled: true
        type: pvc
        storageClass: nfs-client
        size: 10Gi
        existingClaim: ""
        mountPath: /app/config

    # ───────────────────────────────────────────────
    # Workload + PRODUCTION-GRADE PROBES
    # ───────────────────────────────────────────────
    workload:
      main:
        type: Deployment
        enabled: true
        primary: true

        podSpec:
          securityContext:
            container:
              readOnlyRootFilesystem: false

          containers:
            main:
              enabled: true
              primary: true
              imageSelector: image
              env: 
                DB_TYPE: postgres
                DB_HOST: seerr-postgres-rw
                DB_USER: seerr
                DB_NAME: seerr
              # Correct container port
              ports:
                - name: main
                  containerPort: 10241 # Changed for seerr

              # ───────────────────────────────────────
              # STABLE PROBES FOR NFS + LARGE LIBRARIES
              # ───────────────────────────────────────

              probes:
                # seerr becomes ready long before it is fully scanned
                readiness:
                  enabled: true
                  type: http
                  path: /
                  port: main
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 12   # ~2 minutes
                  successThreshold: 1

                # Liveness probe must be gentle — seerr can stall briefly
                liveness:
                  enabled: true
                  type: http
                  path: /
                  port: main
                  initialDelaySeconds: 30
                  periodSeconds: 20
                  timeoutSeconds: 2
                  failureThreshold: 10   # ~3 minutes
                  successThreshold: 1

                # Startup probe prevents container kills during long boot
                startup:
                  enabled: true
                  type: http
                  path: /
                  port: main
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 90   # 15 minutes startup window
  postRenderers:
      - kustomize:
          patches:
            - target:
                kind: Deployment
                name: seerr
              patch: |
                - op: add
                  path: /spec/template/spec/containers/0/env/-
                  value:
                    name: DB_PASS
                    valueFrom:
                      secretKeyRef:
                        name: seerr-postgres-secret
                        key: password  
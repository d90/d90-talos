apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: homebox-postgres
  namespace: default
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:14
  storage:
    storageClass: nfs-client
    size: 1Gi
  bootstrap:
    initdb:
      database: homebox
      owner: homebox
      secret:
        name: homebox-postgres-secret
  superuserSecret:
    name: homebox-postgres-secret
  monitoring:
    enablePodMonitor: true

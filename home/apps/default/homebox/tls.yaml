apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tls.homebox
  namespace: default
spec:
  dnsNames:
    - homebox.d90.name
  secretName: tls.homebox
  privateKey:
    algorithm: ECDSA
    size: 256
  revisionHistoryLimit: 1
  issuerRef:
    name: le-prod-issuer
    kind: ClusterIssuer

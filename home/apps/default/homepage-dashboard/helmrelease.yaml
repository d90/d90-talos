apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: default
spec:
  interval: 5m

  chart:
    spec:
      chart: homepage
      version: "12.6.0" # Ensure this matches the available homepage chart version in your repo
      sourceRef:
        kind: HelmRepository
        name: tc-truecharts
        namespace: flux-system
      interval: 1h
      
  values:
    image:
      repository: ghcr.io/gethomepage/homepage
      tag: v1.10.1@sha256:0b596092c0b55fe4c65379a428a3fe90bd192f10d1b07d189a34fe5fabe7eedb
      pullPolicy: IfNotPresent
    
    workload:
      main:
        podSpec:
          automountServiceAccountToken: true
          containers:
            main:
              env:
                # Set this to your host (example: home.mydomain.com)
                HOMEPAGE_ALLOWED_HOSTS: "*"
          initContainers:
            init-config:
              enabled: false
              type: init
              imageSelector: alpineImage
              command:
                - /bin/sh
                - -c
                - |
                  mkdir -p /app/config
                  if [ ! -f /app/config/bookmarks.yaml ]; then
                    echo "Bookmarks file not found, copying dummy..."
                    cp /dummy-config/bookmarks.yaml /app/config/bookmarks.yaml
                    echo "Config file copied, you can now edit it at /app/config/bookmarks.yaml"
                  fi
                  if [ ! -f /app/config/services.yaml ]; then
                    echo "services file not found, copying dummy..."
                    cp /dummy-config/services.yaml /app/config/services.yaml
                    echo "Config file copied, you can now edit it at /app/config/services.yaml"
                  fi
                  if [ ! -f /app/config/settings.yaml ]; then
                    echo "settings file not found, copying dummy..."
                    cp /dummy-config/settings.yaml /app/config/settings.yaml
                    echo "Config file copied, you can now edit it at /app/config/settings.yaml"
                  fi
                  if [ ! -f /app/config/widgets.yaml ]; then
                    echo "widgets file not found, copying dummy..."
                    cp /dummy-config/widgets.yaml /app/config/widgets.yaml
                    echo "Config file copied, you can now edit it at /app/config/widgets.yaml"
                  fi
                  if [ ! -f /app/config/custom.css ]; then
                    echo "custom.css file not found, copying dummy..."
                    cp /dummy-config/custom.css /app/config/custom.css
                    echo "Config file copied, you can now edit it at /app/config/custom.css"
                  fi
                  if [ ! -f /app/config/custom.js ]; then
                    echo "custom.js file not found, copying dummy..."
                    cp /dummy-config/custom.js /app/config/custom.js
                    echo "Config file copied, you can now edit it at /app/config/custom.js"
                  fi
    service:
      main:
        ports:
          main:
            port: 10352
            protocol: http
            targetPort: 3000
    persistence:
      config:
        enabled: true
        type: emptyDir
        mountPath: /app/config
        # medium: Memory
        # storageClass: nfs-client
        # size: 10Gi
        # existingClaim: ""

        # targetSelector:
        #   main:
        #     main: {}
        #     init-config: {}
      images:
        enabled: true
        type: pvc
        storageClass: nfs-client
        existingClaim: "" # <--- Verify this name via 'kubectl get pvc'
        mountPath: /app/public/images   # Where the web server looks for files
        readOnly: true        
        
      kubernetes-config:
        enabled: true
        mountPath: /app/config/kubernetes.yaml
        subPath: kubernetes.yaml
        readOnly: true
        type: "configmap"
        objectName: config
      bookmarks-config:
        # Only enable when not using forceConfigFromValues
        enabled: "{{ not .Values.forceConfigFromValues }}"
        mountPath: /dummy-config/bookmarks.yaml
        subPath: bookmarks.yaml
        readOnly: true
        type: "configmap"
        objectName: config
        targetSelector:
          main:
            init-config: {}
      force-bookmarks-config:
        # Only enable when using forceConfigFromValues
        enabled: "{{ .Values.forceConfigFromValues }}"
        mountPath: /app/config/bookmarks.yaml
        subPath: bookmarks.yaml
        readOnly: true
        type: "configmap"
        objectName: config
      settings-config:
        # Only enable when not using forceConfigFromValues
        enabled: "{{ not .Values.forceConfigFromValues }}"
        mountPath: /dummy-config/settings.yaml
        subPath: settings.yaml
        readOnly: true
        type: "configmap"
        objectName: config
        targetSelector:
          main:
            init-config: {}
      force-settings-config:
        # Only enable when using forceConfigFromValues
        enabled: "{{ .Values.forceConfigFromValues }}"
        mountPath: /app/config/settings.yaml
        subPath: settings.yaml
        readOnly: true
        type: "configmap"
        objectName: config
      services-config:
        # Only enable when not using forceConfigFromValues
        enabled: "{{ not .Values.forceConfigFromValues }}"
        mountPath: /dummy-config/services.yaml
        subPath: services.yaml
        readOnly: true
        type: "configmap"
        objectName: config
        targetSelector:
          main:
            init-config: {}
      force-services-config:
        # Only enable when using forceConfigFromValues
        enabled: "{{ .Values.forceConfigFromValues }}"
        mountPath: /app/config/services.yaml
        subPath: services.yaml
        readOnly: true
        type: "configmap"
        objectName: config
      widgets-config:
        # Only enable when not using forceConfigFromValues
        enabled: "{{ not .Values.forceConfigFromValues }}"
        mountPath: /dummy-config/widgets.yaml
        subPath: widgets.yaml
        readOnly: true
        type: "configmap"
        objectName: config
        targetSelector:
          main:
            init-config: {}
      force-widgets-config:
        # Only enable when using forceConfigFromValues
        enabled: "{{ .Values.forceConfigFromValues }}"
        mountPath: /app/config/widgets.yaml
        subPath: widgets.yaml
        readOnly: true
        type: "configmap"
        objectName: config
      custom-css-config:
        # Only enable when not using forceConfigFromValues
        enabled: "{{ not .Values.forceConfigFromValues }}"
        mountPath: /dummy-config/custom.css
        subPath: custom.css
        readOnly: true
        type: "configmap"
        objectName: config
        targetSelector:
          main:
            init-config: {}
      force-custom-css-config:
        # Only enable when using forceConfigFromValues
        enabled: "{{ .Values.forceConfigFromValues }}"
        mountPath: /app/config/custom.css
        subPath: custom.css
        readOnly: true
        type: "configmap"
        objectName: config
      custom-js-config:
        # Only enable when not using forceConfigFromValues
        enabled: "{{ not .Values.forceConfigFromValues }}"
        mountPath: /dummy-config/custom.js
        subPath: custom.js
        readOnly: true
        type: "configmap"
        objectName: config
        targetSelector:
          main:
            init-config: {}
      force-custom-js-config:
        # Only enable when using forceConfigFromValues
        enabled: "{{ .Values.forceConfigFromValues }}"
        mountPath: /app/config/custom.js
        subPath: custom.js
        readOnly: true
        type: "configmap"
        objectName: config
    
    serviceAccount:
      main:
        enabled: true
        primary: true
    
    podOptions:
      dnsConfig:
        options:
          - name: ndots
            value: "3"
    
    configmap:
      config:
        enabled: true
        data:
          kubernetes.yaml: |
            mode: cluster
            traefik: true 
          settings.yaml: |
            title: d90 Homepage
        
            background:
              image: https://cdnb.artstation.com/p/assets/images/images/006/897/659/large/mikael-gustafsson-wallpaper-mikael-gustafsson.jpg
              blur: sm # sm, md, xl... see https://tailwindcss.com/docs/backdrop-blur
              # image: https://source.unsplash.com/random/?night,dark
              saturate: 100 # 0, 50, 100... see https://tailwindcss.com/docs/backdrop-saturate
              brightness: 50 # 0, 50, 75... see https://tailwindcss.com/docs/backdrop-brightness
              opacity: 100 # 0-100
        
            # favicon: /images/icons/devil.png
        
            theme: dark
            color: slate
        
            useEqualHeights: true
            headerStyle: boxedWidgets
        
            layout:

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  url: https://cloudnative-pg.github.io/charts
  interval: 1h

---

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.27.1
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  install:
    createNamespace: true
  values:
    fullnameOverride: cnpg-controller-manager
    manager:
      containerPorts:
        - name: webhook-server
          containerPort: 9443
          protocol: TCP
    webhook:
      enabled: true
      certManager:
        enabled: true
      regenerateCerts: true

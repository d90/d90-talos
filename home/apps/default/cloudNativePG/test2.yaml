apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: servarr-postgres
  namespace: default
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:14
  storage:
    storageClass: nfs-client
    size: 1Gi
  bootstrap:
    initdb:
      database: media
      owner: mediauser
      secret:
        name: media-postgres-secret
  superuserSecret:
    name: media-postgres-secret
  monitoring:
    enablePodMonitor: true

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mongodb
  namespace: default
spec:
  interval: 5m

  chart:
    spec:
      chart: mongodb
      version: "16.14.23"
      sourceRef:
        kind: HelmRepository
        name: tc-truecharts
        namespace: flux-system
      interval: 1h

  values:

    image:
      repository: docker.io/bitnamisecure/mongodb
      pullPolicy: IfNotPresent
      tag: latest@sha256:d1afabe9a2183fec201a4248053c71acd81fa381c87443473c16da169e6985d4
    
    workload:
      main:
        replicas: 1
        podSpec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: feature.node.kubernetes.io/cpu-cpuid.AVX
                    operator: Exists        
          containers:
            main:
              env:
                MONGODB_USERNAME: "{{ .Values.mongodbUsername }}"
                MONGODB_DATABASE: "{{ .Values.mongodbDatabase }}"
                MONGODB_PASSWORD: "{{ .Values.password }}"
                MONGODB_ROOT_PASSWORD: "{{ .Values.rootPassword }}"
              # -- Probe configuration
              # -- [[ref]](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
              # @default -- See below
              probes:
                # -- Liveness probe configuration
                # @default -- See below
                liveness:
                  # -- Enable the liveness probe
                  enabled: true
                  # -- Set this to `true` if you wish to specify your own livenessProbe
                  custom: true
                  # -- The spec field contains the values for the default livenessProbe.
                  # If you selected `custom: true`, this field holds the definition of the livenessProbe.
                  # @default -- See below
                  spec:
                    exec:
                      command:
                        - /bin/bash
                        - -ec
                        - echo "db.runCommand(\"ping\")" | mongosh --host localhost --port 27017 ${MONGODB_DATABASE} --quiet
                # -- Redainess probe configuration
                # @default -- See below
                readiness:
                  # -- Enable the readiness probe
                  enabled: true
                  # -- Set this to `true` if you wish to specify your own readinessProbe
                  custom: true
                  # -- The spec field contains the values for the default readinessProbe.
                  # If you selected `custom: true`, this field holds the definition of the readinessProbe.
                  # @default -- See below
                  spec:
                    exec:
                      command:
                        - /bin/bash
                        - -ec
                        - echo "db.runCommand(\"ping\")" | mongosh --host localhost --port 27017 ${MONGODB_DATABASE} --quiet
                # -- Startup probe configuration
                # @default -- See below
                startup:
                  # -- Enable the startup probe
                  enabled: true
                  custom: true
                  # -- The spec field contains the values for the default livenessProbe.
                  # If you selected `custom: true`, this field holds the definition of the livenessProbe.
                  # @default -- See below
                  spec:
                    exec:
                      command:
                        - /bin/bash
                        - -ec
                        - echo "db.runCommand(\"ping\")" | mongosh --host localhost --port 27017 ${MONGODB_DATABASE} --quiet
    service:
      main:
        ports:
          main:
            port: 27017
            targetPort: 27017
            protocol: tcp
    
    securityContext:
      container:
        runAsGroup: 0
        readOnlyRootFilesystem: false
    persistence:
      data:
        enabled: true
        type: pvc
        storageClass: nfs-client
        size: 10Gi
        existingClaim: ""  
        mountPath: "/bitnami/mongodb"
    mongodbUsername: "unifi"
    mongodbDatabase: "unifi"
    rootPassword: "unifi"
    # -- Secret or password
    # One of these options is required, unless used as a dependency for another TrueCharts chart.
    password: "unifi"
    existingSecret: ""
    secret:
      credentials:
        enabled: true
        data:
          mongodb-password: '{{ ( .Values.password | default "empty" ) }}'
          mongodb-root-password: '{{ ( .Values.rootPassword | default "empty" ) }}'
    
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: prowlarr-postgres
  namespace: default
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:14
  storage:
    storageClass: nfs-client
    size: 1Gi
  bootstrap:
    initdb:
      database: prowlarr
      owner: prowlarr
      secret:
        name: prowlarr-postgres-secret
      postInitSQL:
        - CREATE DATABASE "prowlarr-log" OWNER prowlarr;
  superuserSecret:
    name: prowlarr-postgres-secret
  monitoring:
    enablePodMonitor: true
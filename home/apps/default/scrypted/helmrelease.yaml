apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scrypted
  namespace: default
spec:
  interval: 5m

  chart:
    spec:
      chart: scrypted
      version: "8.3.0" # Ensure this matches the available scrypted chart version in your repo
      sourceRef:
        kind: HelmRepository
        name: tc-truecharts
        namespace: flux-system
      interval: 1h

  values:
    image:
      repository: docker.io/koush/scrypted
      tag: v0.123.58-jammy-full@sha256:d84d2a8cc897e3ddd0635aecb681900f551e3f5bf702200df4b92e4014bc22b3
      pullPolicy: Always
    liteImage:
      repository: docker.io/koush/scrypted
      tag: v0.123.58-jammy-lite@sha256:63f28be6ff19e91090d5b133323120ff81af7606aa404cd211073fbea60d0fdc
      pullPolicy: Always
    nvidiaImage:
      repository: docker.io/koush/scrypted
      tag: v0.123.58-jammy-nvidia@sha256:47a9b733493bd1aab5dcfbfb10c5cf379168c1f5545652946fad657df77ab309
      pullPolicy: Always
    intel:
      repository: ghcr.io/koush/scrypted
      tag: v0.123.58-jammy-intel@sha256:c4d35b20c40a9f87933bd4af4d195d85f9660d100cf6bf4b085706c63fdd38fd
      pullPolicy: Always
    
    securityContext:
      container:
        runAsNonRoot: false
        readOnlyRootFilesystem: false
        runAsUser: 0
        runAsGroup: 0
    
    service:
      main:
        ports:
          main:
            protocol: http
            port: 10611
    
    workload:
      main:
        podSpec:
          containers:
            main:
              imageSelector: intel
              env:
                SCRYPTED_INSECURE_PORT: "{{ .Values.service.main.ports.main.port }}"
                # SCRYPTED_WEBHOOK_UPDATE_AUTHORIZATION: Bearer SET_THIS_TO_SOME_RANDOM_TEXT
                # SCRYPTED_WEBHOOK_UPDATE: http://localhost:10444/v1/update
    
    persistence:
      server:
        enabled: true
        type: pvc
        storageClass: nfs-client
        size: 10Gi
        existingClaim: ""
      media:
        enabled: true
        type: pvc
        storageClass: nfs-client
        size: 10Gi
        existingClaim: ""
        mountPath: /media/external
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app scrypted
  annotations:
    {}
  labels:
    app: *app
  namespace: default
spec:
  selector:
    matchLabels:
      app: *app
  template:
    metadata:
      labels:
        app: *app
    spec:
      containers:
        - imagePullPolicy: Always
          name: *app
          volumeMounts:
            - name: nfs-conf
              mountPath: /server/volume
              subPath: scrypted/config
          image: ghcr.io/koush/scrypted@sha256:f23251dad07cf02b4b6b2e364e7948ab9fb77656e31f226186c2ba5304ebd2cd
          envFrom:
            - prefix: ''
              configMapRef:
                name: scrypted
                optional: false              
      hostNetwork: true
      restartPolicy: Always
      volumes:
        - name: nfs-conf
          persistentVolumeClaim: 
            claimName: nfs-pvc-containerdata 
  replicas: 1
  # revisionHistoryLimit: 1
  strategy:
    type: Recreate

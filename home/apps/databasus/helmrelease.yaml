apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: databasus
  namespace: databasus
spec:
  interval: 5m

  chart:
    spec:
      chart: databasus
      version: "3.37.0"
      sourceRef:
        kind: HelmRepository
        name: databasus
        namespace: flux-system
      interval: 1h

  values:
    persistence:
      config:
        type: pvc
        storageClass: nfs-client
        size: 10Gi
        existingClaim: ""
        mountPath: /databasus-data
        enabled: true

    ingress:
      enabled: false

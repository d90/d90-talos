apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tls.databasus
  namespace: databasus
spec:
  dnsNames:
    - databasus.d90.name
  secretName: tls.databasus
  privateKey:
    algorithm: ECDSA
    size: 256
  revisionHistoryLimit: 1
  issuerRef:
    name: le-prod-issuer
    kind: ClusterIssuer
